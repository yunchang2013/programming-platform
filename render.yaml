services:
  - type: web
    name: programming-platform
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: DB_PATH
        value: /data/platform.db
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
